services:
  dockme:
    container_name: dockme
    image: ghcr.io/fernandeusto/dockme:latest
    restart: always
    
    environment:
      HOSTNAME: "Dockme-Central" # ⚠️ Obligatorio, asignar el nombre con el que identificarlo
    
    ports:
      - "5041:8080"   # Puerto para la interfaz web
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # para gestionar los docker del host
      - ./dockme-data:/app/data                   # para persistir configuraciones, iconos, etc.
      - ./stacks:/opt/stacks.                     # ubicacion de archivos compose.yml de cada stack